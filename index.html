<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejaul Karim | Professional Series</title>
    <!-- Premium Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1e293b; 
            --card-bg: #334155; 
            --text-white: #f8fafc;
            --accent-color: #38bdf8; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        .profile-header { margin-bottom: 50px; }

        .profile-name {
            font-size: 45px;
            font-weight: 800;
            color: var(--text-white);
            letter-spacing: -1.5px;
            margin-bottom: 8px;
        }

        .profile-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .cv-list { list-style: none; transition: all 0.5s ease; }
        .cv-item { margin-bottom: 20px; }

        .cv-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            padding: 24px 30px;
            text-decoration: none;
            color: var(--text-white);
            font-weight: 600;
            font-size: 18px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        /* ল্যাপটপ/মাউস ইউজারদের জন্য Hover */
        @media (hover: hover) {
            .cv-link:hover {
                transform: scale(1.1);
                background: #475569;
                border-color: var(--accent-color);
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
                z-index: 5;
            }
            .cv-list:hover .cv-item:not(:hover) {
                opacity: 0.4;
                transform: scale(0.95);
            }
        }

        /* মোবাইল/টাচ ইউজারদের জন্য Special Class */
        .cv-link.mobile-active {
            transform: scale(1.1);
            background: #475569;
            border-color: var(--accent-color);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            z-index: 5;
        }

        .emoji-box { font-size: 26px; margin-right: 20px; }
        .arrow { font-size: 20px; color: var(--accent-color); transition: 0.3s; }

        .footer {
            margin-top: 60px;
            font-size: 11px;
            color: #94a3b8;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">

        </div>

        <div class="cv-list">

                        <span class="emoji-box">⚙️</span> Production & Ops
                    </span>
                    <span class="arrow">→</span>
                </a>
            </div>

            <div class="cv-item">
                <a href="https://hdrejaul.github.io/rejaul-cv/cv2/" class="cv-link" target="_blank">
                    <span style="display: flex; align-items: center;">
                        <span class="emoji-box">🛡️</span> RMA & Quality
                    </span>

                        <span class="emoji-box">👔</span> Service Management

                    <span class="arrow">→</span>
                </a>
            </div>

            <div class="cv-item">
                <a href="https://hdrejaul.github.io/rejaul-cv/cv4/" class="cv-link" target="_blank">

                </a>
            </div>
        </div>

        <div class="footer">

    </div>

    <script>
        // মোবাইলের জন্য ডাবল ট্যাপ লজিক
        const links = document.querySelectorAll('.cv-link');

        links.forEach(link => {
            link.addEventListener('click', function(e) {
                // চেক করবে এটি টাচ ডিভাইস কি না
                if (window.matchMedia("(hover: none)").matches) {
                    if (!this.classList.contains('mobile-active')) {
                        // যদি আগে থেকে এক্টিভ না থাকে, তবে ইভেন্ট আটকাবে এবং বড় হবে
                        e.preventDefault();
                        
                        // অন্য সব লিঙ্ক থেকে এক্টিভ ক্লাস রিমুভ করবে
                        links.forEach(l => l.classList.remove('mobile-active'));
                        
                        // বর্তমান লিঙ্কে এক্টিভ ক্লাস দিবে (বড় হবে)
                        this.classList.add('mobile-active');
                    } else {
                        // দ্বিতীয় ক্লিকে লিঙ্ক ওপেন হবে (স্বাভাবিক কাজ করবে)
                        this.classList.remove('mobile-active');
                    }
                }
            });
        });

        // স্ক্রিনের অন্য কোথাও ক্লিক করলে জুম আউট হবে

    </script>

</body>
</html>
